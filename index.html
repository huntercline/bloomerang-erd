  .table-card {

    border: 0.5px solid #b4b2a9;
    border-radius: 6px;
    overflow: hidden;
    min-width: 200px;
    flex: 0 0 auto;

  .table-name {
    background: #e8e6dc;
    color: #1a1a18;
    font-weight: 500;
    font-size: 12px;
    padding: 6px 10px;

    white-space: nowrap;

  .table-rows tr:nth-child(even) td { background: #f5f4ef; }
  .table-rows tr:nth-child(odd) td { background: #fff; }
  .table-rows td { padding: 3px 10px; font-size: 11px; white-space: nowrap; color: #1a1a18; }
  .table-rows td.col-type { color: #5f5e5a; padding-right: 6px; }
  .badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 500;
    padding: 1px 4px;
    border-radius: 3px;
    margin-left: 4px;
    vertical-align: middle;
    line-height: 1.4;

  .badge-pk { background: #e6f1fb; color: #185fa5; }
  .badge-fk { background: #faeeda; color: #854f0b; }
  .relations { margin-top: 16px; border-top: 0.5px solid #d3d1c7; padding-top: 14px; }
  .relations-title {
    font-size: 11px; font-weight: 500; color: #5f5e5a;

  }
  .rel-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .rel-item {
    background: #fff;
    border: 0.5px solid #d3d1c7;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 11px;
    color: #1a1a18;
    display: flex;
    align-items: center;
    gap: 5px;

  .rel-from { font-weight: 500; }
  .rel-arrow { color: #888780; }
  .rel-to { font-weight: 500; }
  .rel-label { color: #5f5e5a; font-style: italic; }
  .rel-guide {

function buildTable(t) {
  const rows = t.cols.map(([type, name, badge]) =>
    `<tr><td class="col-type">${type}</td><td>${name}${badge ? `<span class="badge badge-${badge.toLowerCase()}">${badge}</span>` : ''}</td></tr>`
  ).join('');
  return `<div class="table-card"><div class="table-name">${t.name}</div><table class="table-rows">${rows}</table></div>`;
}

function buildRels(rels) {
  return rels.map(([from, card, to, label]) =>
    `<div class="rel-item"><span class="rel-from">${from}</span><span class="rel-arrow">${card} →</span><span class="rel-to">${to}</span><span class="rel-label">${label}</span></div>`
  ).join('');
}

  div.className = 'domain' + (i === 0 ? ' active' : '');
  div.id = 'd-' + i;
  div.innerHTML = `<p class="domain-desc">${d.desc}</p><div class="tables-grid">${d.tables.map(buildTable).join('')}</div><div class="relations"><div class="relations-title">Relationships</div><p class="rel-guide"><strong>PK</strong> = primary key &nbsp;·&nbsp; <strong>FK</strong> = foreign key (links to another table) &nbsp;·&nbsp; <strong>1:N</strong> = one-to-many &nbsp;·&nbsp; <strong>N:1</strong> = many-to-one &nbsp;·&nbsp; <em>italic text</em> = description of the relationship</p><div class="rel-list">${buildRels(d.rels)}</div></div>`;
  domainsEl.appendChild(div);
});
</script>
</body>
</html>
